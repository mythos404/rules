# 内置中国大陆 + LAN 规则（必须用这种特殊写法）
FILTER_REGION, tag=CN, force-policy=direct, inserted-resource=true, enabled=true
FILTER_LAN, tag=LAN, force-policy=direct, inserted-resource=true, enabled=true

[filter_local]
# APNs 推送走代理（加在最前面，优先级最高）
host-suffix, push.apple.com, proxy
host-keyword, courier, proxy

# GeoIP 兜底：即使远程规则未加载，国内 IP 也直连
geoip, cn, direct
final, proxy

[server_local]

[rewrite_local]
# Google 中国域名重定向到国际版（避免被墙或显示中文版）
^https?://(www\.)?g\.cn url 302 https://www.google.com
^https?://(www\.)?google\.cn url 302 https://www.google.com
^https?://(www\.)?google\.com\.cn url 302 https://www.google.com

# 可选：如果想强制跳转到香港版（有时解析更快），改成下面这行
