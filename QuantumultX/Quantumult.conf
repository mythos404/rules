[general]
server_check_url = http://www.gstatic.com/generate_204
network_check_url = http://bing.com
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, *.alipay.com, *.taobao.com, *.tmall.com, *.jd.com, *.weixin.qq.com, *.qq.com, id6.me   

[dns]
no-ipv6
no-system
server = 223.5.5.5
server = 119.29.29.29
doh-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query, https://dns.google/dns-query

[policy]
# 自动测速策略（香港/台湾/日本）
url-latency-benchmark=Hong Kong, resource-tag-regex=.*, server-tag-regex=🇭🇰|HK|Hong|hong|香港, check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
url-latency-benchmark=Taiwan, resource-tag-regex=.*, server-tag-regex=🇹🇼|TW|Taiwan|台湾|台灣, check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
url-latency-benchmark=Japan, resource-tag-regex=.*, server-tag-regex=🇯🇵|JP|Japan|日本|东京|大阪, check-interval=600, tolerance=50, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png

# 静态策略（新加坡/美国）
static=Singapore, resource-tag-regex=.*, server-tag-regex=🇸🇬|SG|Singapore|新加坡, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
static=United States, resource-tag-regex=.*, server-tag-regex=🇺🇸|US|USA|美国, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png

[server_remote]
https://em.mesl.cloud/ems/get?token=0a84f68fd3462f32911b752a2f74ed7a, tag=MESL, update-interval=172800, opt-parser=false, enabled=true

[filter_remote]
# Apple、Steam 等常用分流规则（blackmatrix7 仓库）
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Apple/Apple.list, tag=Apple, force-policy=direct, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/SteamCN/SteamCN.list, tag=SteamCN, force-policy=direct, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Steam/Steam.list, tag=Steam, force-policy=direct, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Netflix/Netflix.list, tag=Netflix, force-policy=Singapore, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Spotify/Spotify.list, tag=Spotify, force-policy=direct, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Telegram/Telegram.list, tag=Telegram, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Twitter/Twitter.list, tag=Twitter, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Google/Google.list, tag=Google, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Claude/Claude.list, tag=Claude, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/OpenAI/OpenAI.list, tag=OpenAI, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Gemini/Gemini.list, tag=Gemini, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true

# 内置中国大陆 + LAN 规则（必须用这种特殊写法）
FILTER_REGION, tag=CN, force-policy=direct, inserted-resource=true, enabled=true
FILTER_LAN, tag=LAN, force-policy=direct, inserted-resource=true, enabled=true

[filter_local]
final, proxy

[server_local]

[rewrite_local]
# Google 中国域名重定向到国际版（避免被墙或显示中文版）
^https?://(www\.)?g\.cn url 302 https://www.google.com
^https?://(www\.)?google\.cn url 302 https://www.google.com
^https?://(www\.)?google\.com\.cn url 302 https://www.google.com

# 可选：如果想强制跳转到香港版（有时解析更快），改成下面这行
# ^https?://(www\.)?g\.cn url 302 https://www.google.com.hk
# ^https?://(www\.)?google\.cn url 302 https://www.google.com.hk
